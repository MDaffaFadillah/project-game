<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Duel — Cloud Computing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark:       #0a0a0f;
            --bg-card:       rgba(15, 15, 25, 0.85);
            --accent-cyan:   #00f5ff;
            --accent-pink:   #ff2d75;
            --accent-orange: #ff8c00;
            --accent-green:  #00ff88;
            --accent-yellow: #ffe600;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            min-height: 100vh;
        }

        .video-container {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
        }
        #bg-video {
            width: 100%; height: 100%;
            object-fit: cover; opacity: 0.35; filter: saturate(1.2);
        }
        .video-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(135deg,
                rgba(10,10,15,.75) 0%,
                rgba(20,10,30,.65) 50%,
                rgba(10,10,15,.85) 100%);
            pointer-events: none;
        }

        .screen {
            position: relative; z-index: 10;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .hidden { display: none !important; }

        #lobby-screen { gap: 24px; }

        .game-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-cyan), 0 0 30px var(--accent-cyan);
            animation: titlePulse 3s ease-in-out infinite;
        }
        @keyframes titlePulse {
            0%,100% { text-shadow: 0 0 10px var(--accent-cyan), 0 0 25px var(--accent-cyan); }
            50%      { text-shadow: 0 0 20px var(--accent-cyan), 0 0 50px var(--accent-cyan), 0 0 70px var(--accent-cyan); }
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,.55);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: -10px;
        }

        .input-group {
            display: flex; flex-direction: column;
            gap: 12px; align-items: center;
        }

        #username-input {
            width: 280px; max-width: 88vw;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-family: 'Rajdhani', sans-serif; font-weight: 500;
            text-align: center;
            background: rgba(255,255,255,.05);
            border: 2px solid rgba(0,245,255,.3);
            border-radius: 10px; color: #fff; outline: none;
            transition: all .3s;
        }
        #username-input::placeholder { color: rgba(255,255,255,.4); }
        #username-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0,245,255,.25);
            background: rgba(0,245,255,.04);
        }

        #join-btn {
            padding: 14px 48px;
            font-size: 1.1rem;
            font-family: 'Orbitron', monospace; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-orange));
            border: none; border-radius: 10px; color: #fff;
            cursor: pointer; transition: all .3s;
            box-shadow: 0 4px 24px rgba(255,45,117,.4);
        }
        #join-btn:hover  { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 32px rgba(255,45,117,.6); }
        #join-btn:active { transform: translateY(0) scale(.98); }
        #join-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        #player-list {
            background: var(--bg-card);
            border: 1px solid rgba(0,245,255,.2);
            border-radius: 14px; padding: 20px 28px;
            min-width: 260px; backdrop-filter: blur(10px);
        }
        #player-list h3 {
            font-family: 'Orbitron', monospace;
            font-size: .8rem; letter-spacing: 3px;
            color: var(--accent-cyan); margin-bottom: 12px;
            text-transform: uppercase;
        }
        #players { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        #players li {
            padding: 8px 12px;
            background: rgba(0,245,255,.08);
            border-radius: 7px; border-left: 3px solid var(--accent-cyan);
            font-weight: 500; font-size: .95rem;
            display: flex; align-items: center; gap: 8px;
        }
        #players li::before { content: '▸'; color: var(--accent-cyan); }
        #players li.ready { border-left-color: var(--accent-green); background: rgba(0,255,136,.08); }
        #players li.ready::before { content: '✓'; color: var(--accent-green); }

        #status-text {
            font-size: .9rem; color: rgba(255,255,255,.5);
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

        .dashboard-link {
            position: fixed; bottom: 20px; right: 20px; z-index: 999;
            padding: 10px 18px;
            background: rgba(255,230,0,.15);
            border: 1px solid var(--accent-yellow);
            border-radius: 8px; color: var(--accent-yellow);
            font-family: 'Orbitron', monospace; font-size: .75rem;
            text-decoration: none; letter-spacing: 1px;
            transition: all .3s;
        }
        .dashboard-link:hover { background: rgba(255,230,0,.25); }

        #game-screen { padding: 0; }

        #back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: rgba(255, 255, 255, 0.7);
            font-family: 'Rajdhani', sans-serif; font-size: 1rem;
            cursor: pointer; transition: all .3s;
            backdrop-filter: blur(5px);
        }
        #back-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        #game-area {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden;
            user-select: none;
        }

        #color-overlay {
            position: absolute; inset: 0; z-index: 1;
            transition: background-color .15s ease-out;
        }
 
        .state-wait  #color-overlay { 
            background: radial-gradient(ellipse at center, rgba(160, 30, 30, 0.92) 0%, rgba(80, 15, 15, 0.95) 60%, rgba(40, 5, 5, 0.98) 100%); 
        }
 
        .state-go    #color-overlay { 
            background: radial-gradient(ellipse at center, rgba(220, 180, 0, 0.92) 0%, rgba(180, 140, 0, 0.95) 60%, rgba(100, 80, 0, 0.98) 100%); 
            animation: goPulse .3s ease-out; 
        }
  
        .state-result #color-overlay { 
            background: radial-gradient(ellipse at center, rgba(20, 160, 80, 0.92) 0%, rgba(10, 100, 50, 0.95) 60%, rgba(5, 50, 25, 0.98) 100%); 
        }
 
        .state-early #color-overlay { 
            background: radial-gradient(ellipse at center, rgba(200, 100, 0, 0.92) 0%, rgba(150, 70, 0, 0.95) 60%, rgba(80, 40, 0, 0.98) 100%); 
        }
        
        @keyframes goPulse { 0%{transform:scale(1)} 50%{transform:scale(1.015)} 100%{transform:scale(1)} }

        #game-message {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px; 
            z-index: 10;
            pointer-events: none;
            text-align: center;
            white-space: pre-line;
            line-height: 1.3;
            text-shadow: 0 0 40px rgba(0,0,0,.7);
        }

        .state-wait  #game-message,
        .state-early #game-message {
            font-size: clamp(2rem, 7vw, 4.5rem); 
        }
        .state-go #game-message {
            font-size: clamp(2.5rem, 9vw, 6rem); 
            color: #1a1a1a;
            text-shadow: 0 2px 10px rgba(255, 255, 200, 0.3);
            animation: msgFlash .15s ease-out;
        }
        .state-result #game-message {
            font-size: clamp(1.4rem, 4vw, 2.8rem); 
            color: #fff;
        }
        @keyframes msgFlash { 0%{transform:scale(1.25);opacity:0} 100%{transform:scale(1);opacity:1} }

        #round-indicator {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            z-index: 20;
            font-family: 'Orbitron', monospace;
            font-size: 1rem; color: var(--accent-cyan); letter-spacing: 3px;
            background: rgba(0,0,0,.4); padding: 6px 16px; border-radius: 20px;
            border: 1px solid rgba(0,245,255,.2);
        }

        #stats-panel {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 20; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
        }
        .stat-card {
            background: rgba(0,0,0,.65);
            border: 1px solid rgba(0,245,255,.25);
            border-radius: 10px; padding: 12px 20px;
            min-width: 130px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-label {
            font-size: .7rem; color: var(--accent-cyan);
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px;
        }
        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem; font-weight: 700; color: #fff;
        }
        .stat-unit { font-size: .8rem; color: rgba(255,255,255,.55); }

        #score-panel {
            position: absolute; top: 24px; right: 20px;
            z-index: 20; display: flex; flex-direction: column; gap: 6px;
        }
        .score-item {
            background: rgba(0,0,0,.55);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 8px; padding: 6px 14px;
            font-size: .85rem; display: flex; justify-content: space-between; gap: 14px;
        }
        .score-name { color: rgba(255,255,255,.7); }
        .score-pts  { font-family: 'Orbitron', monospace; color: var(--accent-cyan); font-size: .85rem; }

        @media (max-width: 600px) {
            .game-title { letter-spacing: 3px; }
            #username-input { width: 90vw; }
            .stat-card { min-width: 100px; padding: 10px 12px; }
            .stat-value { font-size: 1.2rem; }
            #stats-panel { bottom: 12px; gap: 8px; }
            .state-result #game-message { font-size: clamp(1.2rem, 5vw, 2rem); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
</head>
<body>

<div class="video-container">
    <video autoplay muted loop id="bg-video">
        <source src="asset/background.webm" type="video/webm">
    </video>
    <div class="video-overlay"></div>
</div>

<div id="lobby-screen" class="screen">
    <h1 class="game-title">Reaction Duel</h1>
    <p class="subtitle">Test Your Reflexes</p>

    <div class="input-group">
        <input type="text" id="username-input" placeholder="Masukkan Nama..." maxlength="20" autocomplete="off">
        <button id="join-btn">Join Room</button>
    </div>

    <div id="player-list">
        <h3>Players in Room</h3>
        <ul id="players"></ul>
    </div>

    <p id="status-text">Menunggu pemain lain...</p>
</div>

<div id="game-screen" class="screen hidden">

    <button id="back-btn">← Back to Lobby</button>

    <div id="round-indicator">RONDE 1 / 5</div>

    <div id="game-area" class="state-wait">
        <div id="color-overlay"></div>
        <h1 id="game-message">WAIT...</h1>
    </div>

    <div id="score-panel"></div>

    <div id="stats-panel">
        <div class="stat-card">
            <div class="stat-label">Rata-rata</div>
            <div class="stat-value"><span id="stat-avg">---</span> <span class="stat-unit">ms</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Konsistensi</div>
            <div class="stat-value"><span id="stat-consistency">---</span> <span class="stat-unit">ms</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Terbaik</div>
            <div class="stat-value"><span id="stat-best">---</span> <span class="stat-unit">ms</span></div>
        </div>
    </div>
</div>

<a href="dashboard.html" class="dashboard-link">📊 Dashboard</a>

<script src="client.js"></script>
</body>
</html>
